  .tab-inactive { background: #f1f5f9; color: #475569; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .modal-content { animation: slideUp 0.3s ease-out; }

];

let tasks = [];
let filteredTasks = [];
let currentTab = 'Pendiente';
let isSaving = false;
const STORAGE_KEY = 'mantenimiento_tasks_v12';

function init() {
    populateLocalDropdowns();
    loadFromStorage();
    setupEventListeners();
    applyFilters();
    updateStats();
}

function populateLocalDropdowns() {
    const filterLocal = document.getElementById('filterLocal');
    const taskLocal = document.getElementById('taskLocal');
    LOCALES.forEach(local => {
        const option1 = document.createElement('option');
        option1.value = local;
        option1.textContent = local;
        filterLocal.appendChild(option1);
        const option2 = document.createElement('option');
        option2.value = local;
        option2.textContent = local;
        taskLocal.appendChild(option2);
    });
}

function loadFromStorage() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
        try {
            tasks = JSON.parse(stored);
            if (!tasks || tasks.length === 0) {
                tasks = [...TASKS_DATA];
                saveToStorage();
            }
        } catch(e) {
            tasks = [...TASKS_DATA];
            saveToStorage();
        }
    } else {
        tasks = [...TASKS_DATA];
        saveToStorage();
    }
}

function saveToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function setupEventListeners() {
    document.getElementById('addTaskBtn').addEventListener('click', openModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelTask').addEventListener('click', closeModal);
    document.getElementById('taskForm').addEventListener('submit', handleAddTask);
    document.getElementById('filterLocal').addEventListener('change', applyFilters);
    document.getElementById('filterPrioridad').addEventListener('change', applyFilters);
    document.getElementById('filterCategoria').addEventListener('change', applyFilters);
    document.getElementById('resetFilters').addEventListener('click', resetFilters);
    document.getElementById('exportData').addEventListener('click', exportToCSV);
    document.getElementById('resetAll').addEventListener('click', resetAllTasks);
    document.getElementById('tabPendientes').addEventListener('click', () => switchTab('Pendiente'));
    document.getElementById('tabCompletadas').addEventListener('click', () => switchTab('Completado'));
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('taskFecha').value = today;
}

function switchTab(tab) {
    currentTab = tab;
    const tabPendientes = document.getElementById('tabPendientes');
    const tabCompletadas = document.getElementById('tabCompletadas');
    if (tab === 'Pendiente') {
        tabPendientes.classList.remove('tab-inactive');
        tabPendientes.classList.add('tab-active');
        tabCompletadas.classList.remove('tab-active');
        tabCompletadas.classList.add('tab-inactive');
    } else {
        tabCompletadas.classList.remove('tab-inactive');
        tabCompletadas.classList.add('tab-active');
        tabPendientes.classList.remove('tab-active');
        tabPendientes.classList.add('tab-inactive');
    }
    applyFilters();
}

function openModal() {
    document.getElementById('taskModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('taskModal').classList.add('hidden');
    document.body.style.overflow = 'auto';
    document.getElementById('taskForm').reset();
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('taskFecha').value = today;
}

function handleAddTask(e) {
    e.preventDefault();
    if (isSaving) return;
    isSaving = true;
    const btn = document.getElementById('saveTaskBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Guardando...';
    const newTask = {
        id: Date.now(),
        local: document.getElementById('taskLocal').value,
        tarea: document.getElementById('taskTarea').value,
        categoría: document.getElementById('taskCategoria').value,
        prioridad: document.getElementById('taskPrioridad').value,
        fecha_ingreso: document.getElementById('taskFecha').value,
        estado: 'Pendiente',
        comentarios: document.getElementById('taskComentarios').value,
        nota_cierre: '',
        fecha_cierre: ''
    };
    tasks.unshift(newTask);
    saveToStorage();
    applyFilters();
    updateStats();
    closeModal();
    setTimeout(() => {
        isSaving = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i> Guardar Tarea';
    }, 300);
}

function applyFilters() {
    const localFilter = document.getElementById('filterLocal').value;
    const prioridadFilter = document.getElementById('filterPrioridad').value;
    const categoriaFilter = document.getElementById('filterCategoria').value;
    filteredTasks = tasks.filter(task => {
        if (task.estado!== currentTab) return false;
        if (localFilter!== 'all' && task.local!== localFilter) return false;
        if (prioridadFilter!== 'all' && task.prioridad!== prioridadFilter) return false;
        if (categoriaFilter!== 'all' && task.categoría!== categoriaFilter) return false;
        return true;
    });
    renderTasks();
}

function resetFilters() {
    document.getElementById('filterLocal').value = 'all';
    document.getElementById('filterPrioridad').value = 'all';
    document.getElementById('filterCategoria').value = 'all';
    applyFilters();
}

function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
        task.estado = task.estado === 'Pendiente'? 'Completado' : 'Pendiente';
        if (task.estado === 'Completado' &&!task.fecha_cierre) {
            task.fecha_cierre = new Date().toISOString().split('T')[0];
        }
        saveToStorage();
        applyFilters();
        updateStats();
    }
}

function updateComment(id, comment) {
    const task = tasks.find(t => t.id === id);
    if (task) {
        task.comentarios = comment;
        saveToStorage();
    }
}

function updateNotaCierre(id, nota) {
    const task = tasks.find(t => t.id === id);
    if (task) {
        task.nota_cierre = nota;
        saveToStorage();
    }
}

function renderTasks() {
    const container = document.getElementById('tasksContainer');
    const emptyState = document.getElementById('emptyState');
    if (filteredTasks.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
    }
    emptyState.classList.add('hidden');
    container.innerHTML = filteredTasks.map(task => {
        const priorityClass = task.prioridad === 'Alta'? 'priority-alta' : task.prioridad === 'Media'? 'priority-media' : 'priority-baja';
        const isCompleted = task.estado === 'Completado';
        return `
            <div class="task-card bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden ${isCompleted? 'completed' : ''}">
                <div class="${priorityClass} h-2"></div>
                <div class="p-5">
                    <div class="flex items-start gap-4">
                        <div class="checkbox-wrapper pt-1">
                            <input type="checkbox" ${isCompleted? 'checked' : ''}
                                onchange="toggleTask(${task.id})"
                                class="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-start justify-between gap-2 mb-2">
                                <h3 class="task-title text-lg font-semibold text-slate-800 leading-tight">${task.tarea}</h3>
                                <span class="flex-shrink-0 px-3 py-1 text-xs font-semibold text-white rounded-full ${priorityClass}">
                                    ${task.prioridad}
                                </span>
                            </div>
                            <div class="flex flex-wrap gap-2 mb-3 text-sm">
                                <span class="flex items-center gap-1 text-slate-600 bg-slate-100 px-2 py-1 rounded">
                                    <i class="fa-solid fa-store text-xs"></i> ${task.local}
                                </span>
                                <span class="flex items-center gap-1 text-slate-600 bg-slate-100 px-2 py-1 rounded">
                                    <i class="fa-solid fa-tag text-xs"></i> ${task.categoría}
                                </span>
                                <span class="flex items-center gap-1 text-slate-600 bg-slate-100 px-2 py-1 rounded">
                                    <i class="fa-solid fa-calendar text-xs"></i> ${task.fecha_ingreso}
                                </span>
                                ${isCompleted && task.fecha_cierre? `
                                <span class="flex items-center gap-1 text-emerald-700 bg-emerald-100 px-2 py-1 rounded">
                                    <i class="fa-solid fa-check text-xs"></i> Cerrada: ${task.fecha_cierre}
                                </span>
                                ` : ''}
                            </div>
                            <div class="space-y-2">
                                <div>
                                    <label class="text-xs font-medium text-slate-500 mb-1 block">
                                        <i class="fa-solid fa-comment-dots mr-1"></i>Comentarios
                                    </label>
                                    <textarea
                                        placeholder="Agregar comentario..."
                                        onchange="updateComment(${task.id}, this.value)"
                                        class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"
                                        rows="2">${task.comentarios || ''}</textarea>
                                </div>
                                ${isCompleted? `
                                <div>
                                    <label class="text-xs font-medium text-emerald-700 mb-1 block">
                                        <i class="fa-solid fa-clipboard-check mr-1"></i>Nota de cierre
                                    </label>
                                    <textarea
                                        placeholder="Ej: Reparado por Juan. Se cambió grifería. Fecha: 18/06/26"
                                        onchange="updateNotaCierre(${task.id}, this.value)"
                                        class="w-full px-3 py-2 text-sm bg-emerald-50 border border-emerald-200 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition resize-none"
                                        rows="2">${task.nota_cierre || ''}</textarea>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.estado === 'Completado').length;
    const pending = total - completed;
    const percent = total > 0? Math.round((completed / total) * 100) : 0;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('progressPercent').textContent = percent + '%';
    document.getElementById('progressBar').style.width = percent + '%';
}

function exportToCSV() {
    const headers = ['Local', 'Tarea', 'Categoría', 'Prioridad', 'Fecha Ingreso', 'Estado', 'Fecha Cierre', 'Comentarios', 'Nota Cierre'];
    const rows = tasks.map(t => [
        t.local, t.tarea, t.categoría, t.prioridad, t.fecha_ingreso, t.estado, t.fecha_cierre || '', t.comentarios || '', t.nota_cierre || ''
    ]);
    let csv = headers.join(',') + '\n';
    rows.forEach(row => {
        csv += row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `tareas_mantenimiento_${new Date().toISOString().split('T')[0]}.csv`;
    link.click();
}

function resetAllTasks() {
    if (confirm('¿Estás seguro? Esto borrará todas las tareas y comentarios. Esta acción no se puede deshacer.')) {
        localStorage.removeItem(STORAGE_KEY);
        tasks = [...TASKS_DATA];
        saveToStorage();
        applyFilters();
        updateStats();
        alert('Tareas reiniciadas a los valores originales');
    }
}

init();
</script>
