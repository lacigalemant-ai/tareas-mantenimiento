    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      .task-card{transition:all 0.2s ease}
      .task-card:hover{transform:translateY(-2px)}
      .completed{opacity:0.6}
      .completed.task-title{text-decoration:line-through}

      .tab-inactive{background:#e2e8f0;color:#64748b}
      .loading{animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

                </div>
                <div class="flex flex-wrap gap-3">

"","fecha_cierre":""},{"id":51,"local":"CC 121 - Las Piedras","tarea":"1 papelera para fondo","categoría":"General","prioridad":"Baja","fecha_ingreso":"2026-06-14","estado":"Pendiente","comentarios":"","nota_cierre":"","fecha_cierre":""},{"id":52,"local":"CC 121 - Las Piedras","tarea":"Luz venta 2 bombitas","categoría":"Eléctrica","prioridad":"Alta","fecha_ingreso":"2026-06-14","estado":"Pendiente","comentarios":"","nota_cierre":"","fecha_cierre":""},{"id":53,"local":"CC 121 - Las Piedras","tarea":"Patitas heladera venta","categoría":"Refrigeración","prioridad":"Media","fecha_ingreso":"2026-06-14","estado":"Pendiente","comentarios":"","nota_cierre":"","fecha_cierre":""},{"id":54,"local":"CC 121 - Las Piedras","tarea":"Mesa fondo arreglar floja","categoría":"Carpintería","prioridad":"Media","fecha_ingreso":"2026-06-14","estado":"Pendiente","comentarios":"","nota_cierre":"","fecha_cierre":""},{"id":55,"local":"CC 121 - Las Piedras","tarea":"Revisar WC fondo","categoría":"General","prioridad":"Media","fecha_ingreso":"2026-06-14","estado":"Pendiente","comentarios":"","nota_cierre":"","fecha_cierre":""}];

let tasks = [];
let filteredTasks = [];
let currentTab = 'Pendiente';

function init() {
    populateLocalDropdowns();
    setupEventListeners();
    listenToTasks();
}

async function initializeDatabase() {
    const snapshot = await getDocs(tasksCollection);
    if (snapshot.empty) {
        const batch = writeBatch(db);
        TASKS_DATA.forEach(task => {
            const docRef = doc(tasksCollection);
            batch.set(docRef, {...task, createdAt: Date.now()});
        });
        await batch.commit();
    }
}

function listenToTasks() {
    const q = query(tasksCollection, orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
        document.getElementById('loadingState').classList.add('hidden');
        if (snapshot.empty) {
            initializeDatabase();
            return;
        }
        // ESTA ES LA LÍNEA CLAVE - GUARDAMOS EL ID REAL DE FIRESTORE
        tasks = snapshot.docs.map(doc => ({
            docId: doc.id,
           ...doc.data()
        }));
        applyFilters();
        updateStats();
    });
}

function populateLocalDropdowns() {
    const filterLocal = document.getElementById('filterLocal');
    const taskLocal = document.getElementById('taskLocal');
    LOCALES.forEach(local => {
        filterLocal.add(new Option(local, local));
        taskLocal.add(new Option(local, local));
    });
}
        
function setupEventListeners() {
    document.getElementById('addTaskBtn').addEventListener('click', openModal);
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelTask').addEventListener('click', closeModal);
    document.getElementById('taskForm').addEventListener('submit', handleAddTask);
    document.getElementById('filterLocal').addEventListener('change', applyFilters);
    document.getElementById('filterPrioridad').addEventListener('change', applyFilters);
    document.getElementById('filterCategoria').addEventListener('change', applyFilters);
    document.getElementById('resetFilters').addEventListener('click', resetFilters);
    document.getElementById('exportData').addEventListener('click', exportToCSV);
    document.getElementById('inventoryBtn').addEventListener('click', () => alert('Módulo de Inventario - próximamente'));
    document.getElementById('tabPendientes').addEventListener('click', () => switchTab('Pendiente'));
    document.getElementById('tabCompletadas').addEventListener('click', () => switchTab('Completado'));
    document.getElementById('taskFecha').value = new Date().toISOString().split('T')[0];    
}

function switchTab(tab) {
    currentTab = tab;
    const tabPendientes = document.getElementById('tabPendientes');
    const tabCompletadas = document.getElementById('tabCompletadas');
    if (tab === 'Pendiente') {
        tabPendientes.classList.replace('tab-inactive','tab-active');
        tabCompletadas.classList.replace('tab-active','tab-inactive');
    } else {
        tabCompletadas.classList.replace('tab-inactive','tab-active');
        tabPendientes.classList.replace('tab-active','tab-inactive');
    }
    applyFilters();
}

function openModal() { document.getElementById('taskModal').classList.remove('hidden'); }
function closeModal() {
    document.getElementById('taskModal').classList.add('hidden');
    document.getElementById('taskForm').reset();
    document.getElementById('taskFecha').value = new Date().toISOString().split('T')[0];
}
async function handleAddTask(e) {
    e.preventDefault();
    const btn = document.getElementById('saveTaskBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Guardando...';

    const newTask = {
        local: document.getElementById('taskLocal').value,
        prioridad: document.getElementById('taskPrioridad').value,
        tarea: document.getElementById('taskTarea').value,
        categoría: document.getElementById('taskCategoria').value,
        fecha_ingreso: document.getElementById('taskFecha').value,
        comentarios: document.getElementById('taskComentarios').value,
        estado: 'Pendiente',
        nota_cierre: '',
        fecha_cierre: '',
        createdAt: Date.now()
    };

    await addDoc(tasksCollection, newTask);
    closeModal();
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-check mr-2"></i>Guardar';
}

function applyFilters() {
    const filterLocal = document.getElementById('filterLocal').value;
    const filterPrioridad = document.getElementById('filterPrioridad').value;
    const filterCategoria = document.getElementById('filterCategoria').value;

    filteredTasks = tasks.filter(task => {
        const matchEstado = task.estado === currentTab && task.estado!== 'Eliminado';
        const matchLocal = filterLocal === 'all' || task.local === filterLocal;
        const matchPrioridad = filterPrioridad === 'all' || task.prioridad === filterPrioridad;
        const matchCategoria = filterCategoria === 'all' || task.categoría === filterCategoria;
        return matchEstado && matchLocal && matchPrioridad && matchCategoria;
    });

    renderTasks();
}

function resetFilters() {
    document.getElementById('filterLocal').value = 'all';
    document.getElementById('filterPrioridad').value = 'all';
    document.getElementById('filterCategoria').value = 'all';
    applyFilters();
}

function updateStats() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.estado === 'Completado').length;
    const pending = total - completed;
    const percent = total > 0? Math.round((completed / total) * 100) : 0;

    document.getElementById('totalCount').textContent = total;
    document.getElementById('completedCount').textContent = completed;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('progressPercent').textContent = percent + '%';
    document.getElementById('progressBar').style.width = percent + '%';

    document.querySelectorAll('.loading').forEach(el => el.classList.remove('loading'));
}

function renderTasks() {
    const container = document.getElementById('tasksContainer');
    const emptyState = document.getElementById('emptyState');

    if (filteredTasks.length === 0) {
        container.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
    }

    emptyState.classList.add('hidden');
    container.innerHTML = filteredTasks.map(task => createTaskCard(task)).join('');

    filteredTasks.forEach(task => {
        const checkbox = document.getElementById(`check-${task.id}`);
        const deleteBtn = document.getElementById(`delete-${task.id}`);
        const noteInput = document.getElementById(`note-${task.id}`);

        if (checkbox) checkbox.addEventListener('change', () => toggleTask(task.id));
        if (deleteBtn) deleteBtn.addEventListener('click', () => deleteTask(task.id));
        if (noteInput) noteInput.addEventListener('change', (e) => updateNote(task.id, e.target.value));
    });
}

function createTaskCard(task) {
    const isCompleted = task.estado === 'Completado';
    const priorityClass = task.prioridad === 'Alta'? 'priority-alta' : task.prioridad === 'Media'? 'priority-media' : 'priority-baja';
    const priorityIcon = task.prioridad === 'Alta'? 'fa-exclamation' : task.prioridad === 'Media'? 'fa-minus' : 'fa-arrow-down';

    return `
        <div class="task-card bg-white rounded-xl shadow-md p-5 border border-slate-200 ${isCompleted? 'completed' : ''}">
            <div class="flex items-start gap-4">
                <input type="checkbox" id="check-${task.id}" ${isCompleted? 'checked' : ''} class="mt-1 w-5 h-5 text-indigo-600 rounded focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                <div class="flex-1">
                    <div class="flex items-start justify-between gap-4 mb-3">
                        <h3 class="task-title text-lg font-semibold text-slate-800 flex-1">${task.tarea}</h3>
                        <button id="delete-${task.id}" class="text-slate-400 hover:text-red-600 transition">
                            <i class="fa-solid fa-trash text-sm"></i>
                        </button>
                    </div>
                    <div class="flex flex-wrap gap-2 mb-3">
                        <span class="px-3 py-1 ${priorityClass} text-white text-xs font-semibold rounded-full">
                            <i class="fa-solid ${priorityIcon} mr-1"></i>${task.prioridad}
                        </span>
                        <span class="px-3 py-1 bg-slate-100 text-slate-700 text-xs font-semibold rounded-full">
                            <i class="fa-solid fa-tag mr-1"></i>${task.categoría}
                        </span>
                        <span class="px-3 py-1 bg-indigo-100 text-indigo-700 text-xs font-semibold rounded-full">
                            <i class="fa-solid fa-location-dot mr-1"></i>${task.local}
                        </span>
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 text-xs font-semibold rounded-full">
                            <i class="fa-solid fa-calendar mr-1"></i>${task.fecha_ingreso}
                        </span>
                    </div>
                    ${task.comentarios? `<p class="text-sm text-slate-600 mb-3"><i class="fa-solid fa-comment-dots text-slate-400 mr-2"></i>${task.comentarios}</p>` : ''}
                    ${isCompleted? `
                        <div class="mt-3 p-3 bg-emerald-50 border border-emerald-200 rounded-lg">
                            <label class="block text-xs font-semibold text-emerald-700 mb-1">Nota de cierre:</label>
                            <input type="text" id="note-${task.id}" value="${task.nota_cierre || ''}" placeholder="Ej: Reparado el 18/06 por Juan" class="w-full px-3 py-2 bg-white border border-emerald-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 focus:border-transparent">
                            ${task.fecha_cierre? `<p class="text-xs text-emerald-600 mt-2"><i class="fa-solid fa-check mr-1"></i>Cerrado: ${task.fecha_cierre}</p>` : ''}
                        </div>
                    ` : ''}
                </div>
            </div>
        </div>
    `;
}

async function toggleTask(id) {
    try {
        const task = tasks.find(t => t.id === id);
        if (!task ||!task.docId) {
            console.error('No se encontró la tarea o falta docId:', task);
            return;
        }

        const newEstado = task.estado === 'Pendiente'? 'Completado' : 'Pendiente';
        const updateData = { estado: newEstado };

        if (newEstado === 'Completado') {
            updateData.fecha_cierre = new Date().toISOString().split('T')[0];
        } else {
            updateData.fecha_cierre = '';
            updateData.nota_cierre = '';
        }

        console.log('Actualizando docId:', task.docId, updateData);
        await updateDoc(doc(db, 'tareas', task.docId), updateData);
        console.log('Tarea actualizada OK');

    } catch (error) {
        console.error('Error al actualizar tarea:', error);
        alert('Error al marcar la tarea. Revisá la consola F12');
    }
}
async function updateNote(id, note) {
    try {
        const task = tasks.find(t => t.id === id);
        if (!task ||!task.docId) return;
        await updateDoc(doc(db, 'tareas', task.docId), { nota_cierre: note });
        console.log('Nota actualizada');
    } catch (error) {
        console.error('Error al actualizar nota:', error);
    }
}

async function deleteTask(id) {
    try {
        const task = tasks.find(t => t.id === id);
        if (!task ||!task.docId) return;
        if (confirm('¿Eliminar esta tarea? Esta acción no se puede deshacer.')) {
            await updateDoc(doc(db, 'tareas', task.docId), { estado: 'Eliminado' });
            console.log('Tarea eliminada');
        }
    } catch (error) {
        console.error('Error al eliminar tarea:', error);
        alert('Error al eliminar. Revisá la consola F12');
    }
}

function exportToCSV() {
    const headers = ['Local','Tarea','Categoría','Prioridad','Fecha Ingreso','Estado','Comentarios','Nota Cierre','Fecha Cierre'];
    const rows = tasks.map(t => [t.local, t.tarea, t.categoría, t.prioridad, t.fecha_ingreso, t.estado, t.comentarios || '', t.nota_cierre || '', t.fecha_cierre || '']);
    let csv = headers.join(',') + '\n';
    rows.forEach(row => {
        csv += row.map(v => `"${v}"`).join(',') + '\n';
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tareas_mantenimiento_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
}

init();
</script>
