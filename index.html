<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Mantenimiento - Tiempo Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      .task-card{transition:all 0.2s ease}
      .task-card:hover{transform:translateY(-2px)}
      .completed{opacity:0.6}
      .completed.task-title{text-decoration:line-through}
      .priority-alta{background:linear-gradient(135deg,#ef4444 0%,#dc2626 100%)}
      .priority-media{background:linear-gradient(135deg,#f59e0b 0%,#d97706 100%)}
      .priority-baja{background:linear-gradient(135deg,#10b981 0%,#059669 100%)}
      .tab-active{background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);color:white}
      .tab-inactive{background:#e2e8f0;color:#64748b}
      .loading{animation:pulse 2s cubic-bezier(0.4,0,0.6,1) infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
    <div class="max-w-7xl mx-auto p-4 md:p-6">
        <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800 mb-2">
                        <i class="fa-solid fa-screwdriver-wrench text-indigo-600 mr-2"></i>
                        Gestión de Mantenimiento
                    </h1>
                    <p class="text-slate-600 flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        Sincronizado en tiempo real para todos
                    </p>
                </div>
                <div class="flex flex-wrap gap-3">
                    <button id="addTaskBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-semibold transition shadow-lg">
                        <i class="fa-solid fa-plus mr-2"></i>Nueva Tarea
                    </button>
                    <button id="inventoryBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition shadow-lg">
                        <i class="fa-solid fa-boxes-stacked mr-2"></i>Inventario
                    </button>
                    <button id="exportData" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-semibold transition shadow-lg">
                        <i class="fa-solid fa-file-csv mr-2"></i>Exportar
                    </button>
                </div>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-6">
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-200">
                    <div class="text-slate-500 text-sm font-medium mb-1">Total</div>
                    <div id="totalCount" class="text-3xl font-bold text-slate-800 loading">-</div>
                </div>
                <div class="bg-emerald-50 rounded-xl p-4 border border-emerald-200">
                    <div class="text-emerald-600 text-sm font-medium mb-1">Completadas</div>
                    <div id="completedCount" class="text-3xl font-bold text-emerald-700 loading">-</div>
                </div>
                <div class="bg-amber-50 rounded-xl p-4 border border-amber-200">
                    <div class="text-amber-600 text-sm font-medium mb-1">Pendientes</div>
                    <div id="pendingCount" class="text-3xl font-bold text-amber-700 loading">-</div>
                </div>
                <div class="bg-indigo-50 rounded-xl p-4 border border-indigo-200">
                    <div class="text-indigo-600 text-sm font-medium mb-1">Progreso</div>
                    <div id="progressPercent" class="text-3xl font-bold text-indigo-700 loading">-</div>
                </div>
            <div class="mt-4 bg-slate-200 rounded-full h-3 overflow-hidden">
                <div id="progressBar" class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Local</label>
                    <select id="filterLocal" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                        <option value="all">Todos los locales</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Prioridad</label>
                    <select id="filterPrioridad" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                        <option value="all">Todas</option>
                        <option value="Alta">Alta</option>
                        <option value="Media">Media</option>
                        <option value="Baja">Baja</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Categoría</label>
                    <select id="filterCategoria" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                        <option value="all">Todas</option>
                        <option value="Sanitaria">Sanitaria</option>
                        <option value="Eléctrica">Eléctrica</option>
                        <option value="Carpintería">Carpintería</option>
                        <option value="Pintura">Pintura</option>
                        <option value="Limpieza">Limpieza</option>
                        <option value="Refrigeración">Refrigeración</option>
                        <option value="General">General</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="resetFilters" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2.5 rounded-xl font-semibold transition">
                        <i class="fa-solid fa-rotate-left mr-2"></i>Limpiar
                    </button>
                </div>
            </div>
        </div>

        <div class="flex gap-2 mb-6">
            <button id="tabPendientes" class="flex-1 tab-active px-6 py-3 rounded-xl font-semibold transition shadow-md">
                <i class="fa-solid fa-clock mr-2"></i>Pendientes
            </button>
            <button id="tabCompletadas" class="flex-1 tab-inactive px-6 py-3 rounded-xl font-semibold transition shadow-md">
                <i class="fa-solid fa-check-circle mr-2"></i>Completadas
            </button>
        </div>

        <div id="tasksContainer" class="space-y-4"></div>
        <div id="emptyState" class="hidden text-center py-16">
            <i class="fa-solid fa-inbox text-6xl text-slate-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-slate-600 mb-2">No hay tareas</h3>
            <p class="text-slate-500">Las tareas aparecerán acá cuando alguien las agregue</p>
        </div>
        <div id="loadingState" class="text-center py-16">
            <i class="fa-solid fa-spinner fa-spin text-6xl text-indigo-500 mb-4"></i>
            <h3 class="text-xl font-semibold text-slate-600">Conectando...</h3>
        </div>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-slate-200 p-6 flex items-center justify-between rounded-t-2xl">
                <h2 class="text-2xl font-bold text-slate-800"><i class="fa-solid fa-plus-circle text-indigo-600 mr-2"></i>Nueva Tarea</h2>
                <button id="closeModal" class="text-slate-400 hover:text-slate-600 transition"><i class="fa-solid fa-times text-2xl"></i></button>
            </div>
            <form id="taskForm" class="p-6 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Local *</label>
                        <select id="taskLocal" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"></select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Prioridad *</label>
                        <select id="taskPrioridad" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                            <option value="Alta">Alta</option>
                            <option value="Media" selected>Media</option>
                            <option value="Baja">Baja</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Tarea *</label>
                    <input type="text" id="taskTarea" required placeholder="Ej: Cambiar canilla de pileta" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Categoría *</label>
                        <select id="taskCategoria" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                            <option value="General">General</option>
                            <option value="Sanitaria">Sanitaria</option>
                            <option value="Eléctrica">Eléctrica</option>
                            <option value="Carpintería">Carpintería</option>
                            <option value="Pintura">Pintura</option>
                            <option value="Limpieza">Limpieza</option>
                            <option value="Refrigeración">Refrigeración</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Fecha *</label>
                        <input type="date" id="taskFecha" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Comentarios</label>
                    <textarea id="taskComentarios" rows="3" placeholder="Detalles adicionales..." class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" id="cancelTask" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 px-6 py-3 rounded-xl font-semibold transition">Cancelar</button>
                    <button type="submit" id="saveTaskBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl font-semibold transition shadow-lg"><i class="fa-solid fa-check mr-2"></i>Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notificación de éxito -->
    <div id="deleteNotification" class="hidden fixed bottom-4 right-4 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 z-40">
        <i class="fa-solid fa-check-circle"></i>
        <span>Tarea eliminada correctamente</span>
    </div>

    <script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, query, orderBy, getDocs, writeBatch } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyADvmIbCWwUULaWYUt-0GMbeTMXX_BpwHY",
  authDomain: "tareas-mantenimiento-c8d2f.firebaseapp.com",
  projectId: "tareas-mantenimiento-c8d2f",
  storageBucket: "tareas-mantenimiento-c8d2f.firebasestorage.app",
  messagingSenderId: "1071995005162",
  appId: "1:1071995005162:web:06bcc6a7f29e9e9538cf93"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const tasksCollection = collection(db, 'tareas_mantenimiento');

const LOCALES = ["CC 10 - Cordón","CC 20 - Pocitos","CC 50 - Intendencia","CC 70 - Garibaldi","CC 80 - Munoz","CC 89 - Montevideo Shopping","CC 95 - Atlántida","CC 97 - Portones","CC 99 - Pta. Carretas A","CC 101 - Tres Cruces A","CC 107 - Peatonal","CC 109 - Rodelú","CC 111 - Malvin","CC 113 - Pta. Carretas B","CC 120 - Nuevo Centro","CC 121 - Las Piedras","CC 150 - Fabrica","CC 910 - Ocean. Benito B","CC 920 - Sorocabana","CC 950/800 - Deposito/FNC"];

const TASKS_DATA = [];

let tasks = [];
let filteredTasks = [];
let currentTab = 'Pendiente';

function init() {
    populateLocalDropdowns();
    setupEventListeners();
    listenToTasks();
}

async function initializeDatabase() {
    const snapshot = await getDocs(tasksCollection);
    if (snapshot.empty) {
        const batch = writeBatch(db);
        TASKS_DATA.forEach(task => {
            const docRef = doc(tasksCollection);
            batch.set(docRef, {...task, createdAt: Date.now()});
        });
        await batch.commit();
    }
}

function listenToTasks() {
    const q = query(tasksCollection, orderBy('createdAt', 'desc'));
    onSnapshot(q, (snapshot) => {
        document.getElementById('loadingState').classList.add('hidden');
        if (snapshot.empty) {
           // initializeDatabase();
            tasks = [];            
            applyFilters();      
            updateStats();
            return;
        }
        // GUARDAR EL ID REAL DE FIRESTORE
        tasks = snapshot.docs.map(doc => ({
            docId: doc.id,
            ...doc.data()
        }));
        applyFilters();
        updateStats();
    });
}

function populateLocalDropdowns() {
    const filterLocal = document.getElementById('filterLocal');
    const taskLocal = document.getElementById('taskLocal');
    LOCALES.forEach(local => {
        filterLocal.add(new Option(local, local));
        taskLocal.add(new Option(local, local));
    });
}
        
function setupEventListeners() {
    document.getElementById('addTaskBtn').addEventListener('click', openModal);
    document.getElementById('inventoryBtn').addEventListener('click', () => window.location.href = 'inventario.html');
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelTask').addEventListener('click', closeModal);
    document.getElementById('taskForm').addEventListener('submit', handleAddTask);
    document.getElementById('filterLocal').addEventListener('change', applyFilters);
    document.getElementById('filterPrioridad').addEventListener('change', applyFilters);
    document.getElementById('filterCategoria').addEventListener('change', applyFilters);
    document.getElementById('resetFilters').addEventListener('click', resetFilters);
    document.getElementById('tabPendientes').addEventListener('click', () => switchTab('Pendiente'));
    document.getElementById('tabCompletadas').addEventListener('click', () => switchTab('Completada'));
    document.getElementById('exportData').addEventListener('click', exportToCSV);
}

function openModal() {
    document.getElementById('taskModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('taskModal').classList.add('hidden');
    document.getElementById('taskForm').reset();
}

async function handleAddTask(e) {
    e.preventDefault(); [cite: 37]
    const task = {
        local: document.getElementById('taskLocal').value, [cite: 38]
        tarea: document.getElementById('taskTarea').value, [cite: 38]
        prioridad: document.getElementById('taskPrioridad').value, [cite: 38]
        categoría: document.getElementById('taskCategoria').value, [cite: 38]
        fecha_ingreso: document.getElementById('taskFecha').value, [cite: 38]
        estado: 'Pendiente', [cite: 38]
        comentarios: document.getElementById('taskComentarios').value, [cite: 38]
        nota_cierre: '', [cite: 38]
        fecha_cierre: '', [cite: 38]
        createdAt: Date.now() [cite: 38]
    };

    // FALTABA ESTO: Guardar en Firestore y cerrar la ventana
    await addDoc(tasksCollection, task); [cite: 27]
    closeModal(); [cite: 37]
}

function applyFilters() {
    const localFilter = document.getElementById('filterLocal').value; [cite: 39]
    const prioridadFilter = document.getElementById('filterPrioridad').value; [cite: 39]
    const categoriaFilter = document.getElementById('filterCategoria').value; [cite: 39]

    filteredTasks = tasks.filter(task => {
        // 1. Filtrar por la pestaña activa (Pendiente o Completada)
        if (task.estado !== currentTab) return false;

        // 2. Filtrar por Local
        if (localFilter !== 'all' && task.local !== localFilter) return false;

        // 3. Filtrar por Prioridad
        if (prioridadFilter !== 'all' && task.prioridad !== prioridadFilter) return false;

        // 4. Filtrar por Categoría
        if (categoriaFilter !== 'all' && task.categoría !== categoriaFilter) return false;

        return true;
    });

    // IMPORTANTE: Después de filtrar, hay que dibujarlas en la pantalla
    renderTasks();
}

function renderTasks() {
    const container = document.getElementById('tasksContainer'); [cite: 39]
    const emptyState = document.getElementById('emptyState'); [cite: 40]

    // Limpiar el contenedor antes de dibujar
    container.innerHTML = '';

    // Si no hay tareas que coincidan con los filtros, mostrar el mensaje de "No hay tareas"
    if (filteredTasks.length === 0) {
        emptyState.classList.remove('hidden');
        return;
    }

    // Si hay tareas, ocultar el cartel de vacío
    emptyState.classList.add('hidden');

    // Dibujar cada tarea
    filteredTasks.forEach(task => {
        const taskCard = document.createElement('div');
        taskCard.className = `task-card ${task.prioridad.toLowerCase()}-priority`; // Ejemplo de clases CSS
        
        taskCard.innerHTML = `
            <div class="task-header">
                <h3>${task.tarea}</h3>
                <span class="badge">${task.prioridad}</span>
            </div>
            <p><strong>Local:</strong> ${task.local}</p>
            <p><strong>Categoría:</strong> ${task.categoría}</p>
            <p>${task.comentarios || 'Sin comentarios'}</p>
            <div class="task-actions">
                <button onclick="toggleTask('${task.docId}')">
                    ${task.estado === 'Pendiente' ? 'Completar' : 'Desmarcar'}
                </button>
                <button onclick="deleteTask('${task.docId}')" class="btn-delete">Eliminar</button>
            </div>
        `;
        container.appendChild(taskCard);
    });
}
    emptyState.classList.add('hidden');
    container.innerHTML = filteredTasks.map(task => `
        <div class="bg-white rounded-2xl shadow-lg p-6 task-card ${task.estado === 'Completada' ? 'completed' : ''}">
            <div class="flex items-start justify-between gap-4">
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-2">
                        <input type="checkbox" id="check-${task.docId}" class="w-5 h-5 cursor-pointer" ${task.estado === 'Completada' ? 'checked' : ''} onchange="toggleTask('${task.docId}')">
                        <span class="priority-${task.prioridad?.toLowerCase()} text-white text-xs px-3 py-1 rounded-full font-semibold">${task.prioridad}</span>
                        <span class="text-slate-500 text-sm">${task.categoría}</span>
                    </div>
                    <h3 class="text-xl font-bold text-slate-800 mb-2 task-title">${task.tarea}</h3>
                    <div class="text-slate-600 text-sm space-y-1">
                        <p><i class="fa-solid fa-building mr-2 text-indigo-600"></i>${task.local}</p>
                        <p><i class="fa-solid fa-calendar mr-2 text-indigo-600"></i>${task.fecha_ingreso}</p>
                        ${task.comentarios ? `<p class="text-slate-700"><i class="fa-solid fa-note-sticky mr-2 text-indigo-600"></i>${task.comentarios}</p>` : ''}
                    </div>
                </div>
                <button class="text-red-600 hover:text-red-800 transition p-2" onclick="deleteTask('${task.docId}')">
                    <i class="fa-solid fa-trash text-lg"></i>
                </button>
            </div>
        </div>
    `).join('');
}

window.toggleTask = async function(docId) {
    const task = tasks.find(t => t.docId === docId);
    if (task) {
        await updateDoc(doc(db, 'tareas_mantenimiento', docId), {
            estado: task.estado === 'Pendiente' ? 'Completada' : 'Pendiente'
        });
    }
};

window.deleteTask = async function(docId) {
    if (confirm('¿Eliminar esta tarea?')) {
        await updateDoc(doc(db, 'tareas_mantenimiento', docId), {
            estado: 'Eliminado'
        });
        document.getElementById('deleteNotification').classList.remove('hidden');
        setTimeout(() => document.getElementById('deleteNotification').classList.add('hidden'), 3000);
    }
};

function updateStats() {
    const validTasks = tasks.filter(t => t.estado !== 'Eliminado'); [cite: 43]
    const completed = validTasks.filter(t => t.estado === 'Completada').length; [cite: 44]
    const pending = validTasks.filter(t => t.estado === 'Pendiente').length; [cite: 44]
    const total = validTasks.length; [cite: 44]
    
    // INYECTAR EN EL HTML (Asegúrate de que estos IDs coincidan con los de tu index.html)
    if(document.getElementById('totalTasks')) document.getElementById('totalTasks').innerText = total;
    if(document.getElementById('completedTasks')) document.getElementById('completedTasks').innerText = completed;
    if(document.getElementById('pendingTasks')) document.getElementById('pendingTasks').innerText = pending;
    
    const progress = total === 0 ? 0 : Math.round((completed / total) * 100); [cite: 45]
    // Si tienes una barra de progreso, la actualizarías aquí
}

function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tabPendientes').classList.toggle('tab-active', tab === 'Pendiente');
    document.getElementById('tabPendientes').classList.toggle('tab-inactive', tab !== 'Pendiente');
    document.getElementById('tabCompletadas').classList.toggle('tab-active', tab === 'Completada');
    document.getElementById('tabCompletadas').classList.toggle('tab-inactive', tab !== 'Completada');
    applyFilters();
}

function resetFilters() {
    document.getElementById('filterLocal').value = 'all';
    document.getElementById('filterPrioridad').value = 'all';
    document.getElementById('filterCategoria').value = 'all';
    applyFilters();
}

function exportToCSV() {
    if (filteredTasks.length === 0) {
        alert('No hay tareas para exportar');
        return;
    }

    let csv = 'Local,Tarea,Prioridad,Categoría,Fecha Ingreso,Estado,Comentarios\n';
    filteredTasks.forEach(task => {
        csv += `"${task.local}","${task.tarea}","${task.prioridad}","${task.categoría}","${task.fecha_ingreso}","${task.estado}","${task.comentarios || ''}"\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', `tareas_${new Date().toISOString().split('T')[0]}.csv`);
    link.click();
}

init();
    </script>
</body>
</html>
